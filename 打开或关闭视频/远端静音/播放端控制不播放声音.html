<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>播放端控制：不播放声音</title>
  </head>
  <body>
    <!-- 当<video>标签设置了 muted 属性后，你会发现虽然将远端获取到音视频流赋值给 <video> 标签进行播放，但最后只有视频被显示出来了，声音不播放 -->
    <video id="remote" autoplay muted playsinline></video>
  </body>
</html>
